<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="cadastro.css">
    <script src="cadastro.js" defer></script>
</head>

<body>

    <div class="container">
        <div class="form-box">

            <!-- HEADER -->
            <div class="header">
                <a href="login.html" class="back-arrow"><span></span></a>
                <h1>Criação de conta</h1>
            </div>

            <!-- FORMULÁRIO -->
            <form id="formCadastro">

                <label for="nome">Nome Completo*</label>
                <input type="text" id="nome" required>

                <label for="date">Data de nascimento*</label>
                <input type="date" id="date" required>

                <label for="celular">Celular*</label>
                <input type="tel" id="celular" placeholder="+55 21 91234-5678" required>

                <p id="erro" class="erro-msg"></p>

                <label for="email">Email*</label>
                <input type="email" id="email" required>

                <label for="senha">Crie uma senha*</label>
                <input type="password" id="senha" required>

                <label for="confirmarSenha">Confirme sua senha*</label>
                <input type="password" id="confirmarSenha" required>

                <button type="submit" id="btnCadastro">
                    Cadastrar
                </button>

            </form>

        </div>
    </div>

    <!-- ===== MODAL ===== -->
    <dialog id="dialogSucesso">
        <div class="modal-content">
            <h2>Sucesso!</h2>
            <p>Cadastro realizado com sucesso!</p>

            <button id="btnFechar" type="button">
                Fechar
            </button>
        </div>
    </dialog>

</body>
</html>
