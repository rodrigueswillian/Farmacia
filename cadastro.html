<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
    <script src="cadastro.js"></script>
</head>
<body>
    <div class="container">
        <div class="form-box">
            <div class="header">
                <a href="#" onclick="window.history.back()" class="back-arrow">&#10094</a>
                <h1> Criação de conta </h1>          
        </div>
        <form action="#">
            <label for="nome">Nome Completo*</label>
            <br>
            <input type="text" id="nome" required>
            <br>
           <label for="date"> Data de nascimento*</label>
           <br>
           <input type="date" id="date" required>
           <br>
           <label for="celular">Celular</label>
           <br>
           <input type="tel" id="celular" name="telefone" placeholder="(99) 99999-9999" maxlength="15" required> 
           <br>
            <p id="erro" style="color:red; display:none;">Por favor, preencha o número completo!</p>

           <label for="email">Email*</label>
           <br>
           <input type="email" id="email" required>
           <br>
           <label for="senha">Crie uma senha*</label>
           <br>
           <input type="password" id="senha" required>
           <br>
           <label for="confirmar-senha">Confirme sua senha*</label>
           <br>
           <input type="password" id="confirmarsenha" required>
           <br>
           <button type="submit" id="botaotelalogin"> Cadastrar </button>

        </form>
</body>
</html>
