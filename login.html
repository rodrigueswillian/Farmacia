<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <h1 class="titulo-login"> Acesso a conta </h1>
            <form class="login-form">
                <label for="login">Email</label>
                <input id="login" type="text" placeholder="Digite seu email">
                <label for="senha">Senha</label>
                <input id="senha" type="password" placeholder="********">
                <a href="tela-inicial.html"><button type="button" id="botao-acessar">Acessar</button></a>
                <a href="cadastro.html"><button type="button" id="botao-primeiro-acesso">Primeiro Acesso</button></a>
            </form>
        </div>

            
    <!-- Modal de Sucesso -->
    <dialog id="modalSucesso">
        <h3>Login realizado com sucesso!</h3>
        <p>Redirecionando para a página inicial...</p>
        <button id="btnFecharSucesso">OK</button>
    </dialog>

    <!-- Modal de Erro -->
    <dialog id="modalErro">
        <h3>Erro no login</h3>
        <p>Email ou senha incorretos. Tente novamente.</p>
        <button id="btnFecharErro">OK</button>
    </dialog>
            
</body>
</html>
