<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
</head>
<body>
    <div class="container">
        <h1 class="titulo-login"> Acesso a conta </h1>
    <div class="login-container">
        <form class="login-form">
            <label> Email </label>
            <br>
            <input id="login" type="text" placeholder="Digite seu email">
            <br>
            <label> Senha </label>
            <br> 
            <input id="senha" type="password" placeholder="********">
            <br>
            <a href="tela-inicial.html"> 
            <button type="button" id="botao-acessar">Acessar</button>
            </a>
            <br>
            <a href="cadastro.html"> 
            <button type="button" id="botao-primeiro-acesso">Primeiro Acesso</button>    
            </a>
            </div>          
            </form>
            
    <!-- Modal de Sucesso -->
    <dialog id="modalSucesso">
        <h3>Login realizado com sucesso!</h3>
        <p>Redirecionando para a página inicial...</p>
        <button id="btnFecharSucesso">OK</button>
    </dialog>

    <!-- Modal de Erro -->
    <dialog id="modalErro">
        <h3>Erro no login</h3>
        <p>Email ou senha incorretos. Tente novamente.</p>
        <button id="btnFecharErro">OK</button>
    </dialog>
            
</body>
</html>
